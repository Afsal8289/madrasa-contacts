<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madrasa Portal - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
    <div class="login-container">
        <h2>Madrasa Login</h2>
        <form id="loginForm">
            <input type="text" id="madrasaId" placeholder="MADRASA ID" 
                   oninput="this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g, '')" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
            <p id="loginError" style="color: red; display: none; margin-top: 10px;">Invalid ID or Password!</p>
        </form>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
